at_least_until_help=You must keep your new employee until at least this date in order to realize the maximum tax credit.  Your employee must work a minimum of 120 hours for you to earn the minimum tax credit.  If your employee quits or is terminated before they've worked 120 hours, you may not receive any tax credit.  Fees for Employer Tax Credit Service are non-refundable and Intuit is not responsible if you're unable (for any reason) to retain your new employee for the minimum required 120 hours.
