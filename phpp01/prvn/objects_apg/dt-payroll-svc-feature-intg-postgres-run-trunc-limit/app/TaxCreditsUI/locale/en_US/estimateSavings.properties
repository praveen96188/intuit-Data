page_tag_line=Your tax credit is a percentage of how much you pay your employee.
body=Your employee must work at least 120 hours for you to receive any tax credit, but the more time they work for you, the larger your credit.  The amount will continue to grow until you reach the maximum amount allowed for the tax credit category your employee qualifies you for &#8212; with maximum tax credit amounts ranging from $1,200 to up to $9,000.\
\n\
\nThe following Tax Credit Estimator can help you estimate your expected tax credit amount

