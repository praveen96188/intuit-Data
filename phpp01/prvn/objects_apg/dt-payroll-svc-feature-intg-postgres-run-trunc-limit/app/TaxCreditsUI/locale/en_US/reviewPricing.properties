page_tag_line=Review Pricing

body=Intuit will help you determine and apply for your tax credit for free. If your application is denied or if your employee quits or is terminated before they've worked the minimum required 120 hours, you pay nothing.

for_this_fee=Intuit will perform the following services for you:

bullet_1=Complete and mail all required government forms.
bullet_2=Work with all the necessary government agencies.
bullet_3=Calculate and deliver your tax credit.
bullet_4=Generate IRS form 2848 for end of year tax preparation.
bullet_5=Answer any questions you or your tax preparer might have.

pricing=If your application is approved and your employee works more than 120 hours, you'll be charged {0} on January 25th -- no money out of pocket. If your application is not approved or your employee quits or is terminated, you pay nothing. Minimum tax credit amount is $217.50, based on an employee paid minimum wage ($7.25/hr) that qualifies under the least lucrative tax credit category and only works 120 hours for your company.  Maximum tax credit amounts range by qualification category from $1,200 to up to $9,000.

savings=Based on the information you provided in the Eligibility Questionnaire and the Tax Credit Estimator, the approximate possible tax credit you could receive for employing and paying your new employee is shown below.

