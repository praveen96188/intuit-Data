closing=Once we have received your signed application for tax credit, we will send you an e-mail confirmation and will begin working with various government agencies to apply for your tax credit certification. We'll keep you informed about progress and deliver your tax credit summary report to you in time to possibly reduce your quarterly estimated income tax payments. At the end of the year we'll provide you with a tax schedule you can take to your tax preparer so that they will be able to include your tax credit with your annual income tax return.
closing_help=A business's Federal Income Tax will normally exceed the amount of tax credit generated.  Therefore, in these situations, the client should be able to use the entire tax credit amount.  If, for any reason, the entire tax credit cannot be used, it can be carried forward to future quarters or years with no expiration date.  Please check with your tax advisor for any changes to the regulation.
