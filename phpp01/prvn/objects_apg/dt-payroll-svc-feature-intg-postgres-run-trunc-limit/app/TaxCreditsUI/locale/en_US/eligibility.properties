sorry_company=<B><font color="#990000">We're sorry,</font> but your company is currently not eligible to take advantage of the Work Opportunity Tax Credit (WOTC) program.</B>
sorry_employee=<B><font color="#990000">We're sorry,</font> but your new employee does not make you eligible for the Work Opportunity Tax Credit (WOTC) program</B>
sorry_time_limit=<B><font color="#990000">We're sorry,</font> but the time to apply for your tax credit has expired</B>

non_profit_ineligible=The WOTC program generates tax credits for "For Profit" companies to use to reduce their Federal Income Tax Liability.  Since Non-Profits do not pay Federal Income Tax, they are not eligible to take advantage of the program.
majority_owners_ineligible=Majority owners of a company are not eligible for the WOTC program.
relative_ineligible=Relatives and dependents of the majority owners of a company are not eligible for the WOTC program.
previously_employed_ineligible=If your new employee is someone you've employed in the past (in other words, this is not the first time they've worked at your company), then they are not eligible for the WOTC program.
time_ineligible=According to the hire date you entered for your new employee, it is now too late for Intuit to apply for Work Opportunity Tax Credit.<sup>1</sup>  In order for Intuit to process the request on your behalf, the eligibility application must be submitted to Intuit no later than 23 days after the hire date.<br><br><br><font size="10">1. To comply with Federal regulations, your application for Work Opportunity Tax Credit eligibility must be postmarked by the 28th day after the employee's hire date.  Intuit requires 5 days to process your application.  In order to process your application, it must be submitted to Intuit no later than 23 days after the employee's hire date.</font>
footnote_1=To comply with Federal regulations, your application for Work Opportunity Tax Credit eligibility must be postmarked by the 28th day after the employee's hire date.  Intuit requires 5 days to process your application.  In order to process your application, it must be submitted to Intuit no later than 23 days after the hire date.

next_time_info=We encourage you to complete the Online Eligibility Form each and every time you hire a new employee. Remember, you could potentially receive up to $9,000 in tax credit per eligible employee, so be sure to complete the free Online Eligibility Form and submit the application to Intuit no later than 23 days after hiring your new employee.  Thank you for using our free Online Eligibility Form.

