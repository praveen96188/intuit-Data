employee_email=Employee Email Address:
employee_email_help=An email will be sent to the employee for electronic signature. If he or she does not have an email address, you may create one or use any email address that is different from the authorized signer email address.
employee_email_same_error=You must enter a different email than the authorized signer email.

fiscal_year=Fiscal Year Start Date (MM/DD):
fiscal_year_help=Most companies start their fiscal year on January 1st. If your fiscal year starts on a different date (in other words, you're not a calendar year tax payer), enter that date here and click Continue. We'll provide your end-of-year tax statement a few weeks after that date. If you don't know your fiscal year start date, leave this item blank and click Continue. We'll then assume that your fiscal year starts on January 1st and provide you with your end-of-year tax statement in mid January.
