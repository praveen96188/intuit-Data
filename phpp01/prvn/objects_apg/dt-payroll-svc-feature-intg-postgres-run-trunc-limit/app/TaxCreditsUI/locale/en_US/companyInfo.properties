page_tag_line=Company Information
body=This information will be used to complete the government forms necessary to have your tax credits approved, and will also be used by Intuit Employer Tax Credit Services to contact you regarding your tax credit savings.  Intuit respects and protects your privacy. For additional information on how your personal information is used and protected please review our site's <a href="PrivacyPolicy.html" target="_blank">privacy statement</a>.
