fez_sorry=<font color="#990000">We're sorry</font>, but we were unable to determine whether or not your employee's home address makes you eligible for the location-based Work Opportunity Tax Credit
fez_please_call=<b>Please call one of our Intuit Tax Specialists at 800.422.8800, ext. 82270</b> and they will help you determine your eligibility.  Then enter the answer to the following question based on the information the Tax Specialist provides.  While you are waiting to speak with a specialist, <B>do not close this window.</B>
fez_eligible=According to the Intuit Tax Specialist you spoke with, are you eligible for the location-based Work Opportunity Tax Credit?


results_title=Eligibility Results
checking=Checking your employee's eligibility...
ee_ineligible=You don't qualify, but try again next time you hire a new employee
ee_ineligible_hire=You don't qualify for the WOTC tax credit, but you may qualify for the HIRE Act exemption
ee_try_again=We're sorry, but your new employee does not qualify you for the Work Opportunity Tax Credit. We encourage you to complete the Online Eligibility Form each and every time you hire a new employee.  Remember, you could potentially receive up to $9,000.00 per eligible employee, so be sure to complete and submit the application for tax credit to Intuit no later than 23 days after hiring your new employee. Thank you for using our free Online Eligibility Form.
ee_hire_try_again=You do not qualify for the Work Opportunity Tax Credit, but you may qualify you for the HIRE Act exemption. If you would like to learn more about the HIRE Act exemption, click <a href="event:hireactinformation">here</a>. We encourage you to complete the Online Eligibility Form each and every time you hire a new employee.  Remember, you could potentially receive up to $9,000.00 per eligible employee, so be sure to submit the application for tax credit to Intuit no later than 23 days after hiring your new employee. Thank you for using our free Online Eligibility Form.

ee_eligible=You qualify for the Work Opportunity Tax Credit
