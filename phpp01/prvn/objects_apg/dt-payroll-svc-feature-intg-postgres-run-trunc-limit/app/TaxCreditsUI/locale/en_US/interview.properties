page_2_tag=Please complete this Online Eligibility Form using the information that your new employee provided in the printed Eligibility Form that they completed and returned to you.
snap_subheader=Section A:
snap_ever=Have you or your immediate family member ever received Food Stamps (Supplemental Nutritional Program, known as SNAP Benefits)?
snap_ever_help=An individual who receives Food Stamp benefits under the Supplemental Nutrition Assistance Program (SNAP) is eligible under the Work Opportunity Tax Credit (WOTC) program.
snap_move_on=If "No," <u>move on to Section B</u>.
snap_last_6_months=If "Yes," have you or your immediate family received Food Stamps for the last 6 consecutive months?
snap_enter_info=If "Yes," enter the name of the primary recipient and the City and State where the benefits were received, then <u>move on to Section B</u>:
snap_3_of_5=If "No," have you or your family received Food Stamps for at least a 3 month period within the last 5 months, but are no longer eligible to receive them?

benefits_primary_name=Name:
benefits_primary_city=City:
benefits_primary_state=State:

yes_no_required=Please select an option.

tanf_subheader=Section B:
tanf_ever=Are you a member of a family that received Temporary Assistance to Needy Families (TANF)?
tanf_ever_help=An individual who has received or is currently receiving benefits under the Temporary Assistance to Needy (TANF) or Aid to Families with Dependent Children (AFDC) during the time periods noted in each question is eligible under the Work Opportunity Tax Credit (WOTC) program.
tanf_move_on_no=If "No," <u>move on to Section C</u>.
tanf_last_18=If "Yes," are you a member of a family that received TANF for the last 18 consecutive months?
tanf_enter_info=If "Yes," enter the name of the primary recipient and the City and State where the benefits were received, then <u>move on to Section C</u>:
tanf_state_law=If "No," did your family stop being eligible for TANF within 2 years before you were hired because Federal or state law limited the maximum time those payments could be made to you?
tanf_9_of_18=If "No," are you a member of a family that received TANF assistance for any 9 months within the last 18 months before you were hired?

referral_subheader=Section C:
referral_referred=Were you referred to your employer by any of the following?
referral_rehab=A Vocational Rehabilitation Agency approved by the state:
referral_rehab_help=An eligible individual is one with a mental or physical challenge who is receiving or has completed rehabilitation services on an Individual Plan of Employment (IPE) from a State Vocational Rehabilitation Agency or from the Veterans Administration Rehabilitation Program.  The individual needs to have been referred to the employer by the agency.
referral_network=An Employment Network under the Ticket to Work Program:
referral_dva=The Department of Veteran Affairs:

veteran_subheader=Section D:
veteran_ever=Are you a veteran of the U.S. Armed Forces?
veteran_ever_help=A veteran is an individual who has served 180 days active duty in U.S. Armed Forces and has been discharged or released from active duty.  A disabled veteran is an individual who has been discharged from active duty due to a service-connected disability.  Unemployment benefits received by a veteran refer to a state unemployment benefit program administered by each state unemployment agency.
veteran_move_on=If "No," <u>move on to Section E</u>.
veteran_answer_2=If "Yes," move on to Question 2.
veteran_snap=Are you a member of a family that received Food Stamps (Supplemental Nutritional Program, known as SNAP Benefits) for at least a 3-month period during the past 15 months?
veteran_answer_4=If "No," move on to Question 4.
veteran_enter_info=If "Yes," enter the Name of the primary recipient, and the City and State where the benefits were received, then move on to the next question:
veteran_disabled=Are you a veteran entitled to compensation for a service-connected disability?
veteran_answer_7=If "No," move on to Question 7.
veteran_answer_5_6=If "Yes," answer Questions 5 and 6.
veteran_discharged_year=During the past year were you discharged or released from active duty before you were hired?
veteran_unemployed_6=Were you unemployed for at least 6 months during the past year before you were hired?
veteran_active_180=Are you an unemployed veteran who has served on active duty for more than 180 days?
veteran_discharged_disability=Were you discharged from active duty for a service-connected disability?
veteran_move_on_8=If you answered "No" to both Questions 7 and 8, <u>move on to Section E</u>.
veteran_answer_9_10=If you answered "Yes" to either questions 7 and 8, answer Questions 9 and 10.
veteran_discharged_5=Were you discharged or released from activity duty within the past 5 years?
veteran_unemployment_4=Did you receive unemployment compensation for at least 4 weeks during the one year period prior being hired for this job?

disconnected_subheader=Section E:
disconnected_ever=Are you at least age 16 but under age 25?
disconnected_move_on=If "No," <u>move on to Section F</u>.
disconnected_high_school=Do you have a High School Diploma or a General Education Development (GED) certificate?
disconnected_last_6=During the last 6 months:
disconnected_attend=Did you attend a high school, community college, college, university, technical or vocational school for more than 10 hours per week?
disconnected_admitted=Have you been admitted to a community college, college, university, technical or vocational school?
disconnected_job_6= Have you held a job for any length of time during the past 6 months?

felon_subheader=Section F:
felon_ever=During the past year, were you convicted of a felony or released from prison after a felony conviction?
felon_move_on=If "No," <u>move on to Section G</u>.
felon_enter_info=If "Yes," provide the following information, then <u>move onto Section G</u>:
felon_date_conviction=Date of conviction:
felon_date_release=Date of Release:
felon_federal_or_state=Was this a Federal or state conviction?
felon_federal=Federal
felon_state=State

other_subheader=Section G:
ssi=Did you receive Supplemental Security Income (SSI) benefits within 60 days before you were hired?
summer_youth=Do you intend to work, or have you already worked, for this employer for any amount of time between May 1 and September 15 of this year?
conditional=Have you received a conditional certification from either a State Workforce Agency (SWA) or a participating local agency for the Work Opportunity Tax Credit (WOTC)?
unemployed_60=Were you out of work for more than 60 days before you were hired?

