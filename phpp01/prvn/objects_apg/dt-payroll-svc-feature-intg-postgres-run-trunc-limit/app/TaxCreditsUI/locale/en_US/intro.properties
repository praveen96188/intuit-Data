learn_more_title=Learn More

footnote_1=Intuit will help you determine and apply for your tax credit for free. If your application is denied or your employee quits or is terminated before they've worked the minimum required 120 hours, you pay nothing.  You'll be charged a flat fee of {0} on Jan 25th only after your employee has worked a minimum of 120 hours and after you've received state agency approval that you're eligible for a tax credit -- no money out of pocket.  An employee paid minimum wage ($7.25/hr) that qualifies under the least lucrative tax credit category and only works 120 hours for your company will result in $217.50 in tax credit.  If that same employee works for you for 875 hours, you'll receive $2,400 in tax credit.

time_limit_title=Why is there a time limit and what do I have to do?
time_limit_body=Your application must be signed no later than 23 days after your employee's official hire date.  This gives Intuit enough time to process your information before the deadline established by the Federal government.
time_limit_apply=Just follow these 3 easy steps and we'll do the rest:
time_limit_step_1=Have your employee complete the Eligibility Form.
time_limit_step_2=Go online and enter some information about the employee and about your company.
time_limit_step_3=Sign the application within 23 days after you hire your employee.

what_we_do_title=What we do for you
what_we_do_call_text=<B>Call us now!</B> Your application must be submitted no later than 23 days after your employee's official hire date. This gives Intuit enough time to process your information before the deadline established by the federal government.\
\n\nWe'll figure out if you're eligible and then send you some forms to sign. After we receive your signed forms, we'll apply for your tax credit approval. Then, we'll calculate your tax credit and create a year-end tax schedule for you.\
\n\nThroughout this process, we'll answer any questions you and your tax preparer have.
what_we_do_you_text=<B>Important:</B> Your application must be submitted no later than 23 days after your employee's official hire date. This gives Intuit enough time to process your information before the deadline established by the federal government.\
\n\nStart the process by doing some of the work yourself: Click <B>Get Started,</B> then answer a few questions to determine if you're eligible. If you're eligible, electronically sign some signed forms that we'll provide. After you sign the forms, we'll apply for your tax credit approval. Then, we'll calculate your tax credit and create a year-end tax schedule for you.\
\n\nThroughout this process, we'll answer any questions you and your tax preparer have.

questions=<B>Have More Questions?</B> Email <a href="event:mailto:taxcredits@intuit.com">taxcredits@intuit.com</a> or Call M-F 8am-5pm PT <font color="#F2782D"><B>800.422.8800</B></font>, ext. 82270