  intuit:
    jobId: 123148783180694
    impersonationJobId: 123148744844899
    identity: 2
    environment: qal
    ResilienceDisabled: false
    authNResilienceConfig:
      circuitBreakerConfig:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 100
        failureRatePercentage: 100
        slowCallRatePercentage: 100
        slowCallDurationThresholdMs: 119000
        permittedCallsInHalfOpen: 10
        minNumberOfCalls: 25
        waitDurationInOpenStateMs: 60000
        requireMetricLogsOfCircuitBreaker: true
      retryConfig:
        maxAttempts: 2
        multiplier: 2.0
        isDisabled: false
        requireMetricLogsOfRetry: true
