payroll:
  security:
    authentication:
      ignore-authentication-failure: true
    authorization:
      ignore-access-failure: true
      filters:
        -
          pattern: "/**"
          filterBeanNames:
            - "requestContextFilter"
  sap:
    authentication:
      operation:
        - "updateCompanyLegalInfo"
        - "updateCompanyContacts"
        - "addBankAccount"
        - "editBankAccount"
