PayrollRejectNOCEEBankAccountNumber.messageString=**PAYROLL SUBMISSION FAILED**\n\
\n\
IMPORTANT:  These instructions will not be available after you click OK. Please capture this information before pressing OK.\n\
\n\
**ACTION REQUIRED**\n\
\n\
Intuit has been informed that {0}''s bank account number has changed.\n\
\n\
Update {0} bank account number:\n\
\n\
FROM\n\
{1}\n\
\n\
TO\n\
{2}\n\
\n\
Please complete the following items in order to successfully transmit payroll:\n\
\n\
1 . Make the above change in {0}''s employee record in QuickBooks.\n\
\ \ \ \  a. From the Employees menu, choose Employee Center\n\
\ \ \ \  b. Double click on {0} to Edit\n\
\ \ \ \  c. Click the Payroll & Compensation tab then click Direct Deposit\n\
\ \ \ \  d. Change the bank account number\n\
\ \ \ \  e. Click OK in the Edit Employee window\n\
2.  Modify the pending paycheck for {0} to include the new account information.\n\
\ \ \ \  a.  In the Employee Center, locate the pending paycheck for {0}.\n\
\ \ \ \  b.  Double click on the paycheck to edit, and click the Paycheck Detail button.\n\
\ \ \ \  c.  Select Unlock Net Pay.\n\
\ \ \ \  d.  Unmark the Direct Deposit box, and then mark it again.\n\
\ \ \ \  e.  Click OK, and then click Save and Close.\n\
3.  Resend the corrected payroll to the payroll service.\n\
\n\
If you have additional questions, refer to the e-mail sent to your payroll administrator or visit http://usepayroll.com/pac for further support.
PayrollRejectNOCEEBankAccountNumber.messageErrorCode=101
PayrollRejectNOCEEBankAccountNumber.messageCode=2301
PayrollRejectNOCEEBankAccountNumber.transmissionErrorMessageString=Payroll rejected: no action taken on NOC - account number changed - for EE {0}.

