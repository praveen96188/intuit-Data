<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <style>
        .infos {
            position: absolute;
            width: 500px;
            height: 100px;
            top: calc(50% - 65px);
            text-align: center;
            left: calc(50% - 250px);
        }

        .infos .icon {
            background-image: url(./zoom-icon.jpg);
            background-size: contain;
            width: 70px;
            height: 70px;

            margin: auto;
        }

        .infos .msg {
            font-size: 14px;
            color: #444;
            margin-top: 16px;
        }
    </style>
</head>

<body>
    <div class="infos">
        <div class="icon"></div>
        <div class="msg">Load APP error. Please close it and retry again</div>
    </div>
</body>

</html>
